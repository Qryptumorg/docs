<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Qryptum Docs</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the path after the base (/docs) into a query param,
      // then redirects to the root so the React app can handle routing.
      var base = '/docs';
      var path = window.location.pathname.slice(base.length) || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      var encoded = '?p=' + encodeURIComponent(path + search) + hash;
      window.location.replace(base + '/' + encoded);
    </script>
  </head>
  <body></body>
</html>
