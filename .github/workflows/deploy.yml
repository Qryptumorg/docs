name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/docs'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        env:
          VITE_API_BASE_URL: https://secdocs.replit.app
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Qryptum Docs ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          body: |
            ## Qryptum Protocol Documentation

            Live: https://qryptumorg.github.io/docs/

            ### Coverage

            #### Introduction
            - Overview, Why Qryptum, How It Works

            #### Security
            - Security Model, Non-Custodial architecture
            - Token Protection, Post-Quantum encryption
            - OTP chain pre-image resistance proof
            - Contract Verification

            #### Smart Contracts
            - Deployed addresses: all V1-V6 Sepolia + V6 Mainnet
            - ShieldFactory, PersonalVault, QToken references
            - Version history: QryptSafe V1 through V6

            #### Developer Resources
            - Quick Start, Integration Guide, API Reference
            - Commit-Reveal Flow, ABI Reference
            - Join Testnet

            ### Active Contract (V6 Sepolia)
            - Factory: `0xeaa722e996888b662E71aBf63d08729c6B6802F4`
            - Implementation: `0x3E03f768476a763A48f2E00B73e4dC69f9E8A7E3`

            ### Languages
            - English (EN)
            - Indonesian (ID)

            ---
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
